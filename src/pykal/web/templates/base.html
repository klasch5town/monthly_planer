<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pykal{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='web.css') }}">
</head>
<body>
  <nav>
    <span class="brand">pykal</span>
    <a href="{{ url_for('main.dashboard') }}"{% if request.endpoint == 'main.dashboard' %} class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('main.events') }}"{% if request.endpoint == 'main.events' %} class="active"{% endif %}>Events</a>
    <a href="{{ url_for('main.birthdays') }}"{% if request.endpoint in ('main.birthdays', 'main.birthdays_edit') %} class="active"{% endif %}>Birthdays</a>
    <a href="{{ url_for('main.settings') }}"{% if request.endpoint == 'main.settings' %} class="active"{% endif %}>Settings</a>
  </nav>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
